GetSupportingDoc:
   Resident_GetSupportingDoc_all_Valid_Smoke:
      endPoint: /resident/v1/download/supporting-documents
      uniqueIdentifier: TC_Resident_SupportingDocument_01      
      description: Get supporting documents      
      role: resident
      restMethod: get
      inputTemplate: resident/GetSupportingDoc/GetSupportingDoc
      outputTemplate: resident/GetSupportingDoc/GetSupportingDocResult
      input: '{
      		"langcode": "$1STLANG$"
}'
      output: '{
            "Content-Type": "application/pdf"
}'

   Resident_GetSupportingDoc_Invalid_Langcode_Neg:
      endPoint: /resident/v1/download/supporting-documents
      uniqueIdentifier: TC_Resident_SupportingDocument_02      
      description: Get supporting documents when invalid language code is given      
      role: resident
      restMethod: get
      inputTemplate: resident/GetSupportingDoc/GetSupportingDoc
      outputTemplate: resident/error
      input: '{
      		"langcode": "engg"
}'
      output: '{
      "errors": [
        {
           "errorCode": "RES-SER-410"
        }
     ]
}'